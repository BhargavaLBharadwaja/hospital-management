<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Doctors - MediCare Hospital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">🏥 <span>MediCare</span></a>
            <ul class="navbar-nav" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="doctors.html" class="active">Doctors</a></li>
                <li><a href="appointments.html">Appointments</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="navbar-actions" id="navActions"></div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 20px;">
        <div class="section-header">
            <h2>Our Expert Doctors</h2>
            <p>Find the right specialist for your health needs</p>
        </div>

        <!-- Search & Filters -->
        <div class="search-filters">
            <input type="text" class="search-input" id="doctorSearch" placeholder="🔍 Search doctors by name or specialization...">
            <select class="filter-select" id="specializationFilter">
                <option value="">All Specializations</option>
            </select>
            <select class="filter-select" id="departmentFilter">
                <option value="">All Departments</option>
            </select>
        </div>

        <!-- Doctors Grid -->
        <div class="doctors-grid" id="doctorsGrid">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <p>Loading doctors...</p>
            </div>
        </div>
    </div>

    <!-- Doctor Detail Modal -->
    <div class="modal-overlay" id="doctorModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalDoctorName">Doctor Details</h3>
                <button class="modal-close" onclick="closeModal('doctorModal')">✕</button>
            </div>
            <div class="modal-body" id="modalDoctorBody">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('doctorModal')">Close</button>
                <button class="btn btn-primary" id="bookFromModal">📅 Book Appointment</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 MediCare Hospital. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>
    <script src="js/doctors.js"></script>
</body>
</html>
