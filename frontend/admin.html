<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MediCare Hospital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">🏥 <span>MediCare</span> <span style="font-size: 12px; background: var(--danger); color: white; padding: 2px 8px; border-radius: 4px;">Admin</span></a>
            <div class="navbar-actions">
                <a href="dashboard.html" class="btn btn-sm btn-outline">Dashboard</a>
                <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 20px;">
        <h1 style="margin-bottom: 30px;">⚙️ Admin Panel</h1>

        <!-- Admin Stats -->
        <div class="dashboard-stats" id="adminStats">
            <div class="stat-card">
                <div class="stat-icon blue">👥</div>
                <div class="stat-info"><h3 id="totalUsers">0</h3><p>Total Users</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">🩺</div>
                <div class="stat-info"><h3 id="totalDoctors">0</h3><p>Doctors</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">📅</div>
                <div class="stat-info"><h3 id="totalApptsAdmin">0</h3><p>Appointments</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">📩</div>
                <div class="stat-info"><h3 id="totalMessages">0</h3><p>Messages</p></div>
            </div>
        </div>

        <!-- Add Doctor Section -->
        <div class="data-card" style="margin-bottom: 20px;">
            <div class="data-card-header"><h3>➕ Add New Doctor</h3></div>
            <div style="padding: 24px;">
                <form id="addDoctorForm">
                    <div class="form-row">
                        <div class="form-group"><label>First Name *</label><input type="text" id="docFirstName" required></div>
                        <div class="form-group"><label>Last Name *</label><input type="text" id="docLastName" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email *</label><input type="email" id="docEmail" required></div>
                        <div class="form-group"><label>Phone *</label><input type="tel" id="docPhone" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Specialization *</label><input type="text" id="docSpecialization" required placeholder="e.g., Cardiology"></div>
                        <div class="form-group"><label>Department *</label><input type="text" id="docDepartment" required placeholder="e.g., Heart"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Qualification *</label><input type="text" id="docQualification" required placeholder="e.g., MBBS, MD"></div>
                        <div class="form-group"><label>License Number *</label><input type="text" id="docLicense" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Experience (years) *</label><input type="number" id="docExperience" required min="0"></div>
                        <div class="form-group"><label>Consultation Fee (₹) *</label><input type="number" id="docFee" required min="0"></div>
                    </div>
                    <div class="form-group"><label>Bio</label><textarea id="docBio" placeholder="Short bio of the doctor..."></textarea></div>
                    <button type="submit" class="btn btn-primary">➕ Add Doctor</button>
                </form>
            </div>
        </div>

        <!-- Users List -->
        <div class="data-card" style="margin-bottom: 20px;">
            <div class="data-card-header">
                <h3>👥 All Users</h3>
                <select class="filter-select" id="userRoleFilter" onchange="loadUsers()" style="min-width: 120px;">
                    <option value="">All Roles</option>
                    <option value="patient">Patients</option>
                    <option value="doctor">Doctors</option>
                    <option value="admin">Admins</option>
                </select>
            </div>
            <div id="usersList" style="overflow-x: auto;"></div>
        </div>

        <!-- Contact Messages -->
        <div class="data-card">
            <div class="data-card-header"><h3>📩 Contact Messages</h3></div>
            <div id="messagesList"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
